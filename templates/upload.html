{% extends "base.html" %}

{% block content %}
<div class="glass-card" style="max-width: 600px; margin: 0 auto;">
    <h2 style="margin-bottom: 1rem; color: var(--primary)">Dataset Upload & Training</h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">Upload the historical UPI transaction CSV data so the model can be configured and updated.</p>
    
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group" style="border: 2px dashed var(--glass-border); padding: 3rem; text-align: center; border-radius: 12px; transition: border-color 0.3s ease;">
            <input type="file" name="dataset" accept=".csv" required style="display: block; margin: 0 auto; color: var(--text-main)">
        </div>    
        <button type="submit" class="btn-primary" style="margin-top: 2rem;">Train and Test Model</button>
    </form>
    
    {% if training_status %}
    <div class="result-box result-valid" style="margin-top: 2rem; padding: 1.5rem;">
        <h3 style="color: var(--success); margin-bottom: 0.5rem">Status: Complete</h3>
        <p>{{ training_status }}</p>
    </div>
    {% endif %}
</div>
{% endblock %}
