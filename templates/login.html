{% extends "base.html" %}

{% block content %}
<div class="glass-card" style="max-width: 400px; width: 100%;">
    <div style="text-align: center; margin-bottom: 2rem;">
        <h1>Sign In</h1>
        <p style="color: var(--text-muted)">Secure Entry Portal</p>
    </div>
    
    <form method="POST">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter username" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn-primary">Authenticate</button>
        <p style="margin-top: 1rem; text-align: center; font-size: 0.85rem; color: var(--text-muted);">
            Use <strong>admin/admin</strong> to log in.
        </p>
    </form>
</div>
{% endblock %}
